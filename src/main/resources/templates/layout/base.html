<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palette Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/app.js}" defer></script>
</head>
<body>
    <header>
        <div class="container header-container">
            <a th:href="@{/}" class="logo">산호 문구점 <span style="font-size: 0.9rem; font-weight: normal; color: var(--text-muted); margin-left: 5px;">sanho's room</span></a>
            <div class="nav-actions">
                <a th:href="@{/cart}" class="cart-icon">
                    🛒
                    <span th:if="${cartCount > 0}" th:text="${cartCount}" class="cart-badge">0</span>
                </a>
                <div class="theme-switcher">
                    <button id="theme-pink" class="theme-btn theme-btn-pink" title="솜사탕 핑크">🌸</button>
                    <button id="theme-mint" class="theme-btn theme-btn-mint" title="멜론 민트">🌿</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div th:replace="${content}"></div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">산호 문구점</div>
            <p>&copy; 2026 산호 문구점. All rights reserved.</p>
            <a href="https://www.instagram.com/sanho_im/" target="_blank" class="insta-link">@sanho_im 🌸</a>
        </div>
    </footer>
</body>
</html>
