<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::main})}">
<body>
    <main>
        <div class="container detail-container">
            <div class="detail-layout">
                <!-- Product Image -->
                <div class="detail-img-wrapper">
                    <img class="detail-img" th:src="${product.imageUrl}" th:alt="${product.name}">
                </div>
                
                <!-- Product Information -->
                <div class="detail-info">
                    <span class="detail-category" th:text="${product.category}">STICKER</span>
                    <h1 class="detail-title" th:text="${product.name}">Product Name</h1>
                    <div class="detail-price" id="price-val" th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')}">0</div>
                    <p class="detail-desc" th:text="${product.description}">Product Description</p>
                    
                    <div class="detail-meta">
                        <div class="meta-row">
                            <span class="meta-label">배송 정보</span>
                            <span class="meta-value">기본 배송 3,000원 (5만원 이상 구매 시 무료)</span>
                        </div>
                        <div class="meta-row">
                            <span class="meta-label">남은 수량</span>
                            <span class="meta-value" th:text="${product.stock} + ' 개'">0개</span>
                        </div>
                        <div class="meta-row" style="align-items: center;">
                            <span class="meta-label">수량 선택</span>
                            <div class="quantity-controller">
                                <button type="button" class="qty-btn" onclick="decreaseQty()">-</button>
                                <input type="number" id="qty-input" class="qty-input" value="1" min="1" th:max="${product.stock}" onchange="updateTotalPrice()">
                                <button type="button" class="qty-btn" onclick="increaseQty()">+</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Total Price Calculation -->
                    <div class="total-calc">
                        <span class="total-label">합계 금액</span>
                        <span class="total-price" id="total-price-val" th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')}">0</span>
                    </div>
                    
                    <!-- Actions -->
                    <div class="detail-actions">
                        <button type="button" class="btn btn-secondary" onclick="history.back()">목록으로</button>
                        <button type="button" class="btn btn-primary btn-full" th:onclick="addToCart([[${product.id}]])">장바구니 담기</button>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            const basePrice = /*[[${product.price}]]*/ 0;
            const maxStock = /*[[${product.stock}]]*/ 0;

            function increaseQty() {
                const qtyInput = document.getElementById('qty-input');
                let val = parseInt(qtyInput.value);
                if (val < maxStock) {
                    qtyInput.value = val + 1;
                    updateTotalPrice();
                } else {
                    alert('최대 재고량을 초과할 수 없습니다.');
                }
            }

            function decreaseQty() {
                const qtyInput = document.getElementById('qty-input');
                let val = parseInt(qtyInput.value);
                if (val > 1) {
                    qtyInput.value = val - 1;
                    updateTotalPrice();
                }
            }

            function updateTotalPrice() {
                const qtyInput = document.getElementById('qty-input');
                let val = parseInt(qtyInput.value);
                if (isNaN(val) || val < 1) {
                    qtyInput.value = 1;
                    val = 1;
                } else if (val > maxStock) {
                    alert('재고 수량을 초과하였습니다.');
                    qtyInput.value = maxStock;
                    val = maxStock;
                }
                const totalPrice = basePrice * val;
                document.getElementById('total-price-val').innerText = totalPrice.toLocaleString();
            }

            function addToCart(productId) {
                const qty = document.getElementById('qty-input').value;
                window.Cart.add(productId, qty);
            }
        </script>
    </main>
</body>
</html>
