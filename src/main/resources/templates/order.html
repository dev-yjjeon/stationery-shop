<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::main})}">
<body>
    <main>
        <div class="container" style="padding: 40px 0;">
            <h1 style="font-weight: 800; font-size: 2.2rem; margin-bottom: 20px;">Checkout</h1>
            
            <!-- Global Error Message (e.g. Out of Stock) -->
            <div th:if="${errorMessage}" class="alert-danger-box">
                <p th:text="${errorMessage}">오류 메시지</p>
            </div>

            <div class="order-layout">
                <!-- Left Column: Shipping & Customer Form -->
                <div class="order-form-section">
                    <h2 style="font-weight: 700; font-size: 1.3rem; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">배송 및 주문 정보 입력</h2>
                    
                    <form th:action="@{/order}" th:object="${orderRequestDto}" method="post">
                        <!-- Customer Name -->
                        <div class="form-group">
                            <label class="form-label" for="customerName">주문자 이름</label>
                            <input type="text" th:field="*{customerName}" class="form-control" placeholder="성함을 입력해주세요.">
                            <span th:if="${#fields.hasErrors('customerName')}" th:errors="*{customerName}" class="form-error">이름 에러</span>
                        </div>
                        
                        <!-- Customer Phone -->
                        <div class="form-group">
                            <label class="form-label" for="customerPhone">연락처</label>
                            <input type="text" th:field="*{customerPhone}" class="form-control" placeholder="예) 010-1234-5678">
                            <span th:if="${#fields.hasErrors('customerPhone')}" th:errors="*{customerPhone}" class="form-error">연락처 에러</span>
                        </div>
                        
                        <!-- Shipping Address -->
                        <div class="form-group">
                            <label class="form-label" for="shippingAddress">배송지 주소</label>
                            <input type="text" th:field="*{shippingAddress}" class="form-control" placeholder="도로명 주소 및 상세 주소를 입력해주세요.">
                            <span th:if="${#fields.hasErrors('shippingAddress')}" th:errors="*{shippingAddress}" class="form-error">배송지 에러</span>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary btn-full" style="margin-top: 20px; padding: 18px;">결제 요청하기</button>
                    </form>
                </div>

                <!-- Right Column: Order Items Summary -->
                <div class="order-summary-section">
                    <h2 style="font-weight: 700; font-size: 1.3rem; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">주문 상품 정보</h2>
                    
                    <!-- Mini Product List -->
                    <div style="margin-bottom: 25px; max-height: 300px; overflow-y: auto;">
                        <div class="order-item-mini" th:each="item : ${cartItems}">
                            <div>
                                <div class="mini-name" th:text="${item.product.name}">Product Name</div>
                                <div class="mini-qty-price" th:text="${item.quantity} + '개 / ' + ${#numbers.formatInteger(item.product.price, 3, 'COMMA')} + ' 원'">1개 / 0원</div>
                            </div>
                            <div style="font-weight: 700;" th:text="${#numbers.formatInteger(item.product.price * item.quantity, 3, 'COMMA')} + ' 원'">0원</div>
                        </div>
                    </div>

                    <!-- Price Calculations -->
                    <div class="summary-row" style="margin-bottom: 10px;">
                        <span class="text-muted">상품 합계</span>
                        <span th:text="${#numbers.formatInteger(totalPrice, 3, 'COMMA')} + ' 원'">0원</span>
                    </div>
                    <div class="summary-row" style="margin-bottom: 10px;">
                        <span class="text-muted">배송비</span>
                        <span th:text="${totalPrice >= 50000 ? '무료' : '3,000원'}">3,000원</span>
                    </div>
                    <div class="summary-row summary-total" style="margin-top: 15px;">
                        <span>최종 결제 금액</span>
                        <span class="price-val" th:text="${#numbers.formatInteger(totalPrice + (totalPrice >= 50000 ? 0 : 3000), 3, 'COMMA')} + ' 원'">0원</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
